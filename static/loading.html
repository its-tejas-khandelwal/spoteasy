<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SpotEasy — Loading...</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
  body{background:#0f1117;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;}
  .logo{width:80px;height:80px;background:linear-gradient(135deg,#16a34a,#22c55e);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 20px;box-shadow:0 0 40px rgba(34,197,94,0.3);animation:pulse 2s infinite;}
  h1{font-size:28px;font-weight:900;margin-bottom:8px;}
  p{color:#6b7280;font-size:15px;margin-bottom:32px;}
  .bar-wrap{width:280px;height:6px;background:#1a2e1a;border-radius:99px;overflow:hidden;margin:0 auto 16px;}
  .bar{height:6px;background:linear-gradient(90deg,#16a34a,#4ade80);border-radius:99px;animation:load 3s ease-in-out forwards;}
  .status{color:#4ade80;font-size:13px;font-weight:600;}
  @keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(34,197,94,0.3);}50%{box-shadow:0 0 60px rgba(34,197,94,0.6);}}
  @keyframes load{0%{width:0%;}60%{width:70%;}90%{width:90%;}100%{width:100%;}}
</style>
</head>
<body>
  <div class="logo">🅿️</div>
  <h1>SpotEasy India</h1>
  <p>Smart Parking for Every Indian City</p>
  <div class="bar-wrap"><div class="bar"></div></div>
  <p class="status" id="status">Starting up...</p>

<script>
const messages = [
  'Starting up...',
  'Connecting to database...',
  'Loading parking lots...',
  'Almost ready...',
  'Opening SpotEasy...'
];
let i = 0;
const el = document.getElementById('status');
const interval = setInterval(() => {
  i = Math.min(i+1, messages.length-1);
  el.textContent = messages[i];
}, 700);

// Keep trying to load the actual site
let attempts = 0;
async function tryLoad() {
  attempts++;
  try {
    const r = await fetch('/health', {cache:'no-store'});
    if (r.ok) {
      clearInterval(interval);
      el.textContent = 'Ready! Redirecting...';
      setTimeout(() => window.location.href = '/', 500);
      return;
    }
  } catch(e) {}
  if (attempts < 30) setTimeout(tryLoad, 2000);
  else window.location.href = '/';
}
setTimeout(tryLoad, 2000);
</script>
</body>
</html>
