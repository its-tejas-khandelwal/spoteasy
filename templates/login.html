{% extends "base.html" %}
{% block title %}Login — ParkSmart{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-8">
  <div class="w-full max-w-md animate-scale-in">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center mx-auto mb-4 shadow-xl">
        <i data-lucide="parking-circle" class="w-8 h-8 text-white"></i>
      </div>
      <h1 class="text-3xl font-black text-gray-900 dark:text-white">Welcome back</h1>
      <p class="text-gray-500 dark:text-gray-400 mt-1">Sign in to ParkSmart India</p>
    </div>
    <div class="card shadow-2xl">
      <form method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Email Address</label>
          <input type="email" name="email" required placeholder="you@example.com" class="inp"/>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Password</label>
          <input type="password" name="password" required placeholder="••••••••" class="inp"/>
        </div>
        <button type="submit" class="btn-primary w-full py-3.5 text-base rounded-2xl mt-2">
          Sign In →
        </button>
      </form>
      <div class="mt-6 pt-5 border-t border-gray-100 dark:border-dark-700 text-center text-sm text-gray-500 dark:text-gray-400">
        Don't have an account?
        <a href="{{ url_for('register') }}" class="text-green-600 dark:text-green-400 font-bold hover:underline ml-1">Register free</a>
      </div>
      <!-- Demo logins hint for viva -->
      <div class="mt-4 bg-gray-50 dark:bg-dark-800 rounded-xl p-3 text-xs text-gray-400 dark:text-gray-500">
        <strong class="text-gray-500 dark:text-gray-400">Demo:</strong>
        Admin: admin@parksmart.in · Register as vendor/customer to test
      </div>
    </div>
  </div>
</div>
{% endblock %}
