<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Offline — SpotEasy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#06080F;color:#F0F6FC;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;}</style>
</head>
<body>
<div>
  <div style="font-size:72px;margin-bottom:20px;">📶</div>
  <h1 style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin-bottom:10px;">You're Offline</h1>
  <p style="color:#8B949E;font-size:16px;margin-bottom:28px;">Check your internet connection and try again.</p>
  <button onclick="location.reload()" style="background:linear-gradient(135deg,#6366F1,#22D3EE);color:white;border:none;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Retry</button>
</div>
