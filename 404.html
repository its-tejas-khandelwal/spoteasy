{% extends "base.html" %}
{% block title %}Login — SpotEasy{% endblock %}
{% block content %}
<div style="max-width:420px;margin:40px auto;">
  <div class="glass-card anim-item visible" style="padding:36px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="width:52px;height:52px;background:linear-gradient(135deg,#6366F1,#22D3EE);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px;">🅿</div>
      <h1 class="syne" style="font-size:24px;font-weight:700;margin-bottom:6px;">Welcome back</h1>
      <p style="color:var(--text-secondary);font-size:14px;">Sign in to SpotEasy</p>
    </div>
    <form method="post" id="loginForm">
      <div style="margin-bottom:16px;">
        <label class="label-text">Email</label>
        <input type="email" name="email" class="inp" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div style="margin-bottom:8px;">
        <label class="label-text">Password</label>
        <div style="position:relative;">
          <input type="password" name="password" id="pwField" class="inp" placeholder="••••••••" required autocomplete="current-password" style="padding-right:44px;"/>
          <button type="button" onclick="togglePw()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0;" id="eyeBtn">👁️</button>
        </div>
      </div>
      <div style="text-align:right;margin-bottom:20px;">
        <span style="font-size:12px;color:var(--text-muted);">Forgot password? Contact admin.</span>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:13px;">Sign In</button>
    </form>
    <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary);">
      Don't have an account? <a href="{{ url_for('register') }}" style="color:#818CF8;text-decoration:none;font-weight:600;">Register Free →</a>
    </div>
  </div>
</div>
<script>
function togglePw(){var f=document.getElementById('pwField');f.type=f.type==='password'?'text':'password';}
document.getElementById('loginForm').addEventListener('submit',function(){
  this.querySelector('button[type=submit]').textContent='Signing in...';
});
</script>
{% endblock %}
